body:
  text: 行事鈔中分門圖錄整理者蘇軍題解行事鈔中分門圖錄唐道宣著一卷是道宣為其四分律刪繁補闕行事鈔所作的科分從圖錄的內容來看其中的科分與道宣的行事鈔原文某些地方略有不同所以本文對研究道宣對閱讀和理解道宣的行事鈔有一定的參考價值本文獻未為我國歷代經錄所載亦未為歷代大藏經所收現於北圖敦煌遺書中發現一號編號為北新號錄文時以此號為底本無校本但文中所引之行事鈔原文則依據大正藏本行事鈔進行了核對為了保持文獻原貌引文與行事鈔不一致者校對時一般不作校正但文字明顯錯誤時則予以改正錄文中天干序號為整理者所加錄文
