佛開緣癸後明相染指如前第四門文云長染之文如上已明者是壬二約離衣壬三約販賣庚二忘見本物成不庚三修捨威儀庚四正說捨詞己二明捨心己三明捨罪自七庚一乞懺庚二請懺悔主庚三懺主單白和僧庚四為說罪名種相庚五正懺根本墮罪庚六呵責庚七立誓己四明還衣雜相分三庚初料簡是非庚次正明還衣文云律云若大衆多難集以下是自二辛先明展轉還法辛次明直付法文云律云應問彼言以下是庚後明雜相文云問先懺根本以下是戊二衆多人法分三己初對四人己二對三人己三對二人戊三對一人丁二明懺九十單墮法分二戊先分別從生懺法戊二正懺根本墮罪丙五懺四提舍尼有五丁一請懺悔主丁二為說罪相丁三正說捨罪丁四呵責丁五立誓丙六懺突吉羅分二丁先出方軌丁次立條例文云今立律論二種懺下是分二戊先出罪種就中自三己初明諸篇覆藏己次明諸篇方便己後明獨頭文云若獨頭吉羅下是戊後明懺儀分二己先懺故作庚先懺從生庚次懺根本己次明誤作分二庚先出其相庚次明作法辛先懺從生辛後懺根本此下更明發露法下卷明隨機要行有十四篇二衣總別篇分二有序甲初明制分三乙前明三衣分二丙初明衣法自四丁一明制意釋名功用自三戊先明制意戊次釋名戊三明功用丁二作之方法自有八門不同戊一明求財如法戊二財體如法戊三色如法戊四量是非戊五條數多少戊六堤數長短戊七重數多少戊八作衣方法丁三加受持法分二戊初明對首法自二己初明受法己次明捨法戊二明心念法丁四雜出料簡分三戊初明受捨是非戊二補治浣染戊三受用擎舉丙後明攝衣法自二丁先明結法丁後明解法乙二明坐具乙三明灑水袋甲後明聽分四乙一百一諸長分二丙先明百一丙次明諸長分二丁先明長相丁後開說淨六門戊一明制說淨意戊二明二施主差別分二己初簡施主就中庚先明衣藥鉢淨主庚後明錢寶穀米淨主己二明請法聽不又二庚前請衣藥鉢主自三辛先明須請辛次明似不須請辛後正加請法庚後請寶主戊三開說進不戊四說淨之法戊五辨施主存亡所以戊六失法不同亦云作法失不之義乙二明糞掃衣丙初明制著意丙次明衣體文云言衣體者是乙三明檀越施衣分二丙一時施自二丁一時現前丁二時僧得丙二非時施丁一非時現前丁二非時僧得乙四明亡五衆物有序分十門丙初明制入僧意丙二明對亡者分法不同十種丁一糞掃取丁二入當時現前僧丁三入同見僧丁四入功能僧丁五入二部僧丁六入面所向處僧丁七入和上丁八入所親白衣丁九隨所在處得丁十入同住現前僧丙三明同活共財丁先明同活丁後明共財丙四明囑授是非分四丁一明囑授善惡自四戊一明囑授善戊二明囑而不善戊三明不囑善戊四明不囑不善丁二明人物差別自四戊一是囑戊二是授戊三是囑非授戊四非囑非授丁三明重單囑授丁四明成不之相丙五負債還不分二丁初明債在當處自二戊先以義分戊後引教證文云十誦云若比丘以下是丁後明債在異處文云又債息異處以下是丙六定物輕重分三三階處決丁一唯用四分不用外宗丁二四分先準諸部類分義決有無傍出輕重有二戊初略以三門料簡己一佛所制畜己二制不聽畜己三佛開聽畜分三庚一性重庚二性輕庚三從用輕重戊後更以七門重判即分七己一絲麻毛綿所作己二瓦石鐵木竹等己三田土園林房舍等己四皮革等己五畜生等己六人民奴婢己七四藥等丁三通用律藏廢立正文及事要者不必依四分為定丙七明具德賞勞文中隱應分三丁先明看病人德丁次明所與物丁後簡人進不丙八明分物時節丙九正加分法有二丁先集財物丁二加法分之有三戊一羯磨法自二己初五人已上法中庚初集僧捨衣庚次問負債有無文云先問僧中誰知下是庚次問囑授同活庚次定輕重庚次作賞勞文云先作賞勞下是庚次正分輕物文云次分輕物律令白二下是庚次與外界不集者文云若外界不集者是庚次與沙彌淨人分法庚後明分法雜相文云如是總計大數下是己後四人法戊二對首法戊三心念法丙十明雜分物法四藥受淨篇無序要分四別一時藥二非時三七日四盡形總以五分明之甲一明四藥體有四乙初就四藥明四藥體乙二就六味明四藥體乙三就轉變明體乙四就相和明體甲二明淨地處所分四乙一制意釋名乙二列數作法自四丙一不周淨丙二檀越淨丙三處分淨丙四作法淨乙三正加法乙四雜出料簡甲三明護淨不同五門乙一翻淨有四不同丙一緣淨丙二體淨丙三緣不淨丙四體不淨此門釋中移在第四也會取乙二明護淨自四丙前護惡獨丙二護自煮丙三護內宿丙四護內煮乙三明罪通塞分二丙初約四藥明罪通塞丙二約四過明通塞分二丁先明四過相丁二將四過對人約時就處望食明通塞戊初將內宿就處人時食明戊二將內煮如前戊三將自煮亦如前戊四將惡觸乙四互明淨染乙五明儉緣開事甲四明淨法差別有三乙初明制淨意乙二明淨處人乙三明淨法甲五明二受有別分八門乙初明制二受意自二丙前明手受意丙次明口受意乙二明受通四藥乙三明對人不同乙四明受法差別分四丙初明時藥指如不受食戒丙二非時丙三七日此三藥自三丙四盡形丁初明非時自四戊一明所受藥須無八患戊二明能授作四法戊三明所受人作三法戊四正加法丁二明受七日自四戊一明所受藥須無八患戊二明能授人作四法戊三明所受比丘有二己一自無五過己二自作四法戊四正加法丁三明受盡形藥自四戊一明藥無八患戊二明能授人作三法戊三明所受比丘作三法戊四正加法乙五明說淨通局乙六明二受寬狹乙七明重加進不乙八雜明罪相自三丙初略雜明七日藥丙二歷四藥明手口二受所防罪多少丙三歷四藥明手口二受生罪多少鉢器制聽篇有序房舍衆具等附明之即分二甲初正篇中制聽分二乙先明制教自分七丙一明制畜鉢意丙二明鉢體丙三明色丙四明鉢量丙五明受鉢法丙六明失受相丙七明受用行護法乙次明聽甲二附篇此門入聽門攝文云餘有養生具入聽攝自如後列也此二門合明文云聽教中既曰衆具故雜列之也對施興治篇有序就中分五甲初明受施人是非甲二明厭治方便甲三明立觀有教甲四明作觀方法依了論作五門乙初計功多少量其來處乙二自忖己身德行乙三防心離過乙四正事良藥乙五為成道業甲五明隨治雜相頭陀行儀篇有序就中分四甲一釋總名甲二列數明體應分二乙先列數位分為四丙一衣丙二食丙三處丙四威儀乙次明行體分二丙先出相生次第丙即分十二丁初納衣丁二三衣丁三乞食丁四不作餘食法丁五一坐食丁六一揣食丁七阿蘭處丁八冢間丁九樹下丁十露地丁十一隨坐丁十二常坐不臥甲三明諸部異行甲四雜出諸法僧像致敬篇有序造立像寺法附即二甲初明正篇分三乙一明制相敬意乙二對敬立緣合不兩相即二丙初明對緣是非丙二明應禮不應禮自二丁初無緣合禮丁次有緣不應禮文云四分十種非威儀不應禮是乙三明立敬儀式有三丙初明敬佛法自二丁初明敬心丁二正明敬相丙二明敬僧法丙三大小致禮法甲後明附篇分二乙初明造像法自二丙初明造經像法意丙次造塔法乙二明造寺法自二丙前明造寺法丙次因明敬三衣法訃請設則篇有序就中分十甲一明受請法甲二往訃法甲三明至請家法甲四就座命客法中乙前明就座法乙後明命客法文云五分若請處外客比丘不得入以下是甲五明觀食淨行法甲六明行香咒願法甲七明受食方法應分五乙前明咒願食法乙二明出衆生食法此門前鈔文自顯乙三明受食法文云僧祇云當留比座坐處行食人過以下是乙四明唱等供法文云四分云得食便食為俗譏責以下是乙後食食法文云僧祇食時應護左手以下是甲八明食竟法甲九明噠嚫法甲十明出請家法道俗化方篇有序分三甲初明說法軌儀授戒法分二乙前明說法儀軌乙二明授戒法分三丙初明翻邪三歸分四丁一明制意丁二明懺悔法丁三作法丁四雜料簡丙二明五戒分三丁一簡人是非丁二作法差別丁三料簡之丙三明八戒中丁初明受法中戊前明心念受法文云必若無人者以下是戊次從人受法文云次受法者智論云以下是丁次明懺悔丁次為說相丁次發願文云願持是布薩福報以下是丁次引證文云僧祇佛告比丘以下是甲次辨生緣奉敬法甲後明士女入寺法中乙先出意乙次正明入法中丙初依舊法明丙後更明護過要術文云餘更略出下是主客相待篇有序四儀法附即二甲前明正篇就中分四乙初明入寺法乙二明問主受房法乙三明相識敬儀乙四明同受利養甲二明附篇瞻病送終篇無序分二甲初明瞻病有四位乙一明制瞻病意乙二簡人是非並供養法乙三安置處所乙四明說法斂念甲二明送終分二乙初明將尸出法乙二明葬法諸雜要行篇有序十種分之甲一明佛法僧事甲二明衆中雜事甲三明別人自行甲四明共行同法甲五明出家要業甲六明遇賊法甲七明大小便法甲八明慈濟衆生法甲九明避惡衆生法甲十明雜治病法沙彌別行篇有序就中分二甲先明出俗本意有七門乙一明出家之緣乙二明勸出有益乙三明障出有損乙四明既出家已行凡罪行乙五明行凡福行乙六明行聖道行乙七大小乘相決同異甲後依意隨解分五乙一明出家俱緣乙二明作法不同乙三明受戒方式分三丙初明緣丙二明體丙三明相乙四明隨戒相分二丙前明隨相自行中丁前明隨相指同大僧丁次明秉法丙二明衆法中丁前明通行丁後明別行乙五明雜行教示尼衆別行篇無序分三甲前明大尼有七別乙一受戒分二丙前明畜衆丙次明受大戒分二丁前濫相丁二正受戒體分二戊初明緣有分五己初明來往是非己二明僧尼數量己三明尼須結界己四安置儀式己五入戒法中戊二體略指不論文云以外受法問難戒體等是也乙二懺罪乙三說戒自二丙先引善見會通四分丙二明差人請法乙四安居受日乙五自恣乙六明隨戒相乙七師徒雜行中丙前明相攝丙次明諸要行甲二明式叉甲三明沙彌尼諸部別行篇有序就中分七甲一明僧數多少甲二明聖法通塞甲三明重犯不同甲四明攝事寬狹甲五明心境差別甲六明捨懺有異甲七明隨相階別録文完
