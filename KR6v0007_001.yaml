body:
  text: 京兆崇義寺沙門道宣述初序次列三十篇題目標宗顯德第一集僧通局第二足數衆相第三別衆法附受欲是非第四通辨羯磨第五結界方法第六僧網大綱第七受戒緣集第八捨戒六念法附師資相攝第九說戒正儀第十安居策修第十一受日法附自恣宗要第十二功德衣法附篇聚名報第十三隨戒釋相第十四持犯方軌第十五懺六聚法第十六二衣總別第十七四藥受淨第十八鉢器制聽第十九房舍等五行調度衆具法附對施興治第二十頭陀行儀第二十一僧像致敬第二十二造立像寺法附訃請設則第二十三導俗化方第二十四主客相待第二十五四儀法附瞻病送終第二十六諸雜要行第二十七謂出世正業等比丘所依沙彌別法第二十八尼衆別行第二十九諸部別行第三十就三十篇中總括得一千三百六十門具列如後以十門括甲第一門序教興意有二乙初通明教興意自三丙初對三藏明教興意丙二對外道明教興意丙三對異宗明教興意乙二別就當宗明教興意就中丙初總序丙次以五例明丁一以遮性往分明教興意丁二以開制往徵明教興意丁三以報有強弱明教興意丁四以機悟為先明教興意丁五以事法相對明教興意甲第二門明制教重輕意就中乙初總序乙次別辨有七丙一約興厭漸頓明制教重輕丙二約結正業科明重輕丙三約報果不同明重輕丙四約攝趣優劣明重輕丙五約起情虛實明重輕丙六約開制互立明制教重輕丙七約行彰異明制教重輕甲第三門明對事約教制處意甲第四門明用諸部文意甲第五門明文義決通意甲第六門明教所詮意甲第七門明道俗七部立教通局意甲第八門明僧尼二部行事通塞意甲第九門明下三衆隨行異同意就中乙前明二衆沙彌乙後明式叉摩那甲第十門明鈔者引用正文去濫傳真科酌意就中自三乙先明引用正文乙次明世中僞說乙後明鈔興本意上卷有十二篇攝於衆務標宗顯德篇分二甲先出宗體即是標宗有四乙一戒法乙二戒體乙三戒行乙四戒相甲後直引聖說成證即是顯德就中分二乙初明順戒有益分二丙前約化教自四丁一小乘經丁二小乘論丁三大乘經丁四大乘論丙後就制教分兩丁先約律本丁二依律論乙二明違戒有損還約化制二教雜明集僧通局篇分二甲前明集僧軌度自二乙先具列文乙後以義設甲二明來處通局有二乙初明來處分齊分二丙一作法界有三別丁一約有戒場大界明來處分齊丁二約無界場大界明來處分齊丁三約三小界明來處分齊丙二自然界有四丁初約聚落界有二戊一可分別戊二不可丁二約蘭若界明來處自二戊一無難戊二有難丁三約道行界明來處丁四約水界明來處乙二明用之通局即有四種七種等足數衆相篇別衆法附即二甲初明正篇就中四例乙初明體是應法於事有違故不足數中丙初總列數丙後釋相文云就中相隱難知者以下乙二明體境俱非雖假緣亦不足數乙三明體非僧用於緣成足乙四明約緣有闕不妨成法少分不足甲次明附篇有二乙初明別相乙二明成不分二丙初約體明成不丙次就外相內心明成不文云衆取威儀不用心順者是分二丁先約外相威儀丁二約內心虛實門受欲是非篇有二甲初明欲緣有三乙一制意釋名明體中丙初明制意丙次明釋名丙次辨體乙二明有開遮乙三定緣是非甲後明欲法分三乙初明與法又分二丙前明與法丙二明對僧說法乙二明失法乙三明遇緣成不通辨羯磨篇分二甲初明作法具緣有十乙一稱量前事乙二約處以明乙三集僧方法乙四集僧差別乙五和合之相乙六簡衆乙七與欲應和乙八正陳本意乙九問其事端乙十答甲後立法通局並曲解羯磨分二乙初明立法通局分二丙初明相攝分齊總有四丁一約法明分齊分二戊初明分齊自二己初略依三位明分齊庚一心念法庚二對首法庚三衆僧法己次曲分前三成八庚心念分三辛一但心念辛二對首心念辛三衆法心念庚對首中分二辛一但對首辛二衆法對首庚衆法中分三辛一單白辛二白二辛三白四戊後略明非相文云上明攝法分齊即須明非相丁二約事明攝法分齊丁三對人明攝法分齊有三戊初約四人以上明分齊戊次約二三人明分齊此門細分有七始從草下一人也戊後約一人明分齊丁四約界明攝法分齊自二戊初約四種自然界明攝法分齊戊二作法界明分齊自五己一約難事受戒小界明攝法分齊己二約自恣小界己三約說戒小界己四約戒場己五約大界明攝法分齊丙二別舉成壞自八丁一約但心念明成壞丁二約對首心念明成壞丁三約衆法心念明成壞丁四約但對首明成壞丁五約衆法對首明成壞丁六約單白明成壞丁七約白二明成壞丁八約白四明成壞乙次解羯磨正文應分三別丙初總標敘丙次正釋文丁前釋單白丁次釋羯磨丙後以三法料簡丁一明增減丁二明通塞丁三明是非結界方法篇有四甲一列數定量總列三種乙一攝衣界指如衣法中乙二攝食界指如藥法中乙三攝僧界是此所明就中分二丙一自然界指如集僧中丙二列作法界明量有三丁初明大界並量丁二明戒場並量丁三明三小界並量甲二依位作法文中分門不次應分二乙初明結法分三丙初結無場大界分二丁先出緣成有三戊一料簡是非戊二豎標唱相分二己初明標相自二庚初定標體庚次明界形己二明唱相自二庚先明唱之是非庚次正明唱法戊三集僧欲法自二己初明集僧己二明不得受欲丁二正加聖法丙二結有場大界分二丁先總明三重標相差別丁後明結法文云今明結法者是戊先結戒場分三己初明先後己二明唱相己三正加法文云羯磨者言以下是戊次結大界中己先明唱相己後加法文云上座如常下是丙三明結三小界法三門分之此中更明三種界別丁初明集僧遠近丁二明不豎標相丁次明結法略不出乙次明解法丙先明解無場大界丙次解有場大界丙次解三小界甲三明法起有無甲四明非法失相自二乙初明非法乙後明失不自二丙先明失相丙二明不失相僧網大綱篇分五甲一約化制二教明相不同分二乙初約化教乙二就制教分二丙初總標舉數丙次別辨治法則有七九義滅擯總十丁一呵責治分二戊先出其過戊後明正治自四己一明立治己二明奪行己三明順從己四明為解丁二擯出治丁三依止治丁四遮不至白衣家治丁五不見舉丁六不懺舉丁七惡見不捨舉丁八惡罵治丁九默擯丁後更明滅擯文云言滅擯者以下是甲二約僧制衆食以論通塞分二乙初約僧制自二丙先明世立非法制丙次明如法僧制乙二約食明自二丙先明通塞之意丙後引聖言量證甲三約法就時對人以明乙初約法乙次就時乙次對人甲四約處就用以明分二乙初約處自二丙初約處丙二約威儀文云二者威儀之形以下是乙後就用文云四分云不得著俗人裩袴以下是甲五衆主教授之相受戒緣集篇捨戒六念法附即分二甲初明正篇分二門乙初緣集成受分五緣丙一能受人有五丁一是人丁二諸根具足丁三身器清淨丁四出家相具丁五得少分法丙二所對境有六丁一結界成就丁二有能秉法僧丁三數滿如法丁四界內盡集丁五有白四法丁六資緣具足丙三發心乞戒丙四心境相應丙五事成究竟乙後加教法有二丙初明緣起方便有十丁一受者得法以不丁二請師就中有三戊一請和上戊二請二闍梨就中己前請戒師己次請教授師戊三請七證丁三教發戒就中有二戊初明緣境戊二明心量文云次令發戒下是丁四立見不聞處丁五單白差威儀師丁六出衆問難就中戊初出難體相又二己初出難相庚一明邊罪難庚二污淨行尼庚三賊心受戒庚四破內外道庚五黃門庚六煞父庚七煞母庚八煞羅漢庚九破僧庚十出佛身血庚十一非人庚十二畜生庚十三二形己二出諸遮難相戊二正明問法文云上已略明雜相今正出衆問下是丁七單白召入衆丁八正明乞戒丁九戒師白和丁十戒師問難丙二正明體用有四丁前受體就中戊前略發戒戊次正受體丁次記受時節丁次說相丁次受衣鉢甲後明附篇自二乙前明六念法乙後明捨戒法師資相攝篇分二甲初明弟子依止法分二乙初明師弟名相就中丙前明名相丙次名總相攝乙後明依止法分二丙先明應法自二丁一明得不依止丁二明須依止丙二明正行自二丁一明七種共行丁二明三種別行甲二明二師攝受法此中和上與依止合明分七乙一明依止意乙二明得無師時節乙三簡師德乙四請師法乙五師攝受法乙六明治罰呵責法自四丙一合呵之法丙二依法呵誡丙三明不應之失丙四明辭師出離之法乙七明失師法說戒正儀篇大分二門甲初明僧法分四乙一明時節不同分五丙一明十三十四十五日不同丙二明食前食後不同丙三明若晝若夜丙四明若增若減丙五明時與非時乙二明雜法衆具乙三正說儀軌分十丙一明說處丙二明衆具丙三明說戒日上座白僧丙四明鳴鐘集衆丙五明供具丙六明維那行事丙七明請戒師法丙八明供養說戒法丙九明問答法丙十明說戒竟法就中更雜相分別乙四略說雜相自二丙前明略緣丙二明略法甲後明別人法就中乙初明三人法乙次明二人法乙後明一人心念法安居策修篇受日法附有三甲初明正篇大分五門乙初明安居緣有三丙一明處有是非丙二明結時不同有三丁一明前安居丁二明中安居丁三明後安居就中泛明前後自三戊一賞罰前後戊二得罪前後戊三難事前後丙三明夏閏延促乙二明分房舍法乙三明作法不同分二丙一設教對緣有四丁一對首法丁二心念法丁三忘成丁四及界丙二明用法分齊乙四明夏中遇緣失不分二丙初明有難移夏丙後明受日出界逢難乙五明迦提五利並夏中解結界法自二丙初明迦提五利丙次明解結界法甲二明附篇就中分三乙一心念法乙二對首法總分三別乙三衆法丙一通料簡分四丁一對人不同丁二對界丁三先後丁四明相攝丙二定緣是非有八丁初定緣是非有五緣戊一三寶緣戊二道俗病患生善滅惡戊三父母大臣戊四為求衣鉢藥草戊五和僧護法丁二對事離合丁三明懸受丁四明互用丁五明重受丁六約事長短丁七僧尼不同丁八事訖不還成不丙三依位解亦云正加法分三丁一心念法丁二對首法丁三衆法甲三料簡雜相自恣宗要篇迦絺那衣法附即二甲初明正篇大分三別乙初明緣集相應分二丙初明緣時節分三丁初約閏明時節丁二明諍事增減自恣丁三明修道稱意延日自恣丙二明相應人乙二正自恣方法分三丙初明五人已上法分四丁一集僧緣起丁二明五德集不分二戊初明六人以上法有四己一簡人是非己二差法正式己三五德行事己四對座說之儀式戊後明五人法此門移在四人法前明也丁三明尼來請罪丁四雜明略說自分二戊前明略說法戊二明有難結小界自恣丙二明四人以下至對首法丙三明一人心念法乙三雜明諸行甲後明附篇就中分五乙一明受衣時節乙二明衣體是非乙三簡人是非自二丙先明受人丙後明持人乙四明受衣方法就中分二丙初明作衣法丙後明受衣法自二丁前明疊綴衣法丁二明和僧受法乙五捨衣雜相自二丙先明捨衣丙次明雜相即是五利也中卷有四篇遵於戒體持犯立懺篇聚名報篇分二甲初明戒護是違失之宗甲後明篇聚名報之相分二乙初明篇聚中丙初略列六聚名丙次釋位即有六丁初釋波羅夷丁二釋僧伽婆尸沙丁三釋偷蘭遮丁四釋波逸提丁五釋波羅提